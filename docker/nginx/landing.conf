# ── Site: landing ────────────────────────────────────────────────────────────

server {
    listen 8081;
    server_name landing.nickelcy.com;

    root /usr/share/nginx/html/landing;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Vite hashed assets (/assets/*.js, /assets/*.css) — safe to cache forever
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Public folder images — same filename can change between deploys, so no immutable
    location ~* \.(png|jpg|jpeg|webp|avif|gif|svg|ico|woff2?|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, must-revalidate";
        access_log off;
    }

    # index.html — never cache so new deploys are picked up immediately
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # SPA fallback for react-router
    location / {
        try_files $uri $uri/ /index.html;
    }
}
